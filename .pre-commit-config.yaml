# Install: `uv sync --group dev` then `uv run pre-commit install`
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.9
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        types_or: [css, markdown]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.20.0
    hooks:
      - id: markdownlint-cli2

  - repo: local
    hooks:
      - id: stylelint
        name: stylelint
        language: node
        types: [css]
        additional_dependencies:
          - stylelint@16.14.1
          - stylelint-config-standard@36.0.1
        entry: stylelint --fix --allow-empty-input
